<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATS|CyberSec</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 60px);
      gap: 30px;
      padding: 40px 20px;
    }

    .content {
      background: var(--cell-bg);
      padding: 40px;
      border-radius: 12px;
      box-shadow: var(--card-shadow);
      text-align: center;
      max-width: 500px;
    }

    .content h1 {
      color: var(--primary);
      margin-bottom: 20px;
      font-size: 2em;
    }

    .content p {
      color: var(--text);
      margin-bottom: 30px;
      font-size: 1.1em;
      line-height: 1.8;
    }

    .btn-download {
      display: inline-block;
      background: var(--accent);
      color: white;
      padding: 15px 40px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 1.1em;
      font-weight: bold;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(0, 84, 255, 0.3);
    }

    .btn-download:hover {
      background: #0070d9;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0, 84, 255, 0.4);
    }

    .btn-download:active {
      transform: translateY(0);
    }
  </style>

  <meta property="og:type" content="website">
  <meta property="og:title" content="ATS|CyberSec">
  <meta property="og:description" content="Ссылка для добавления в группу">
  <meta property="og:url" content="https://nasriddinovs.uz/ats">
</head>
<body>
  <header class="header">
    <div class="logo">ATS</div>
    <nav class="nav">
      <a href="/">На главную</a>
    </nav>
    <button class="menu-btn" id="menu-btn">☰</button>
  </header>

  <div class="container">
    <div class="content">
      <h1>Добавление в группу проверки</h1>
      <p>На компьютере с которого зашли в свой аккаунт на пайтонтютор, перейдите по ссылке и нажмите кнопку добавиться в класс.</p>
      <a href="https://pythontutor.ru/join/wTR8NOVi" 
         class="btn-download" 
         target="_blank" 
         rel="noopener noreferrer">
        Перейти по ссылке
      </a>
    </div>
  </div>

  <script defer src="scripts.js"></script>
</body>
</html>
